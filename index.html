<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競馬収支ダッシュボード</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <!-- Summary -->
    <div class="card summary">
      <div id="profit" class="profit">---</div>
      <div id="roi" class="roi">ROI ---%</div>
      <div id="updated" class="updated">読み込み中...</div>
    </div>

    <!-- Chart -->
    <div class="card">
      <div class="chart-title">累計推移</div>
      <canvas id="chart"></canvas>
    </div>

    <!-- Monthly -->
    <div class="card">
      <div class="card-title">今月の成績</div>
      <div id="monthly" class="monthly-row">
        <span class="monthly-label">---</span>
        <span class="monthly-profit">---</span>
      </div>
    </div>

    <!-- Weekend selector -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">日別結果</div>
        <div id="month-selector" class="month-selector"></div>
      </div>
      <div id="weekend-selector"></div>
    </div>

    <!-- Daily content -->
    <div class="card" id="daily-card" style="display:none;">
      <div id="daily-content"></div>
    </div>

    <!-- Detail link -->
    <a href="detail.html" class="detail-link">→ 詳細を見る</a>
  </div>

  <script>
    let globalData = null;
    let chartInstance = null;
    const CURRENT_YEAR = 2026;

    async function loadData() {
      try {
        const res = await fetch(`data_${CURRENT_YEAR}.json`);
        globalData = await res.json();
        renderSummary();
        renderChart();
        renderMonthly();
        renderWeekendSelector();
      } catch (e) {
        document.getElementById('profit').textContent = 'Error';
        document.getElementById('updated').textContent = e.message;
      }
    }

    function renderSummary() {
      const profit = globalData.summary.totalProfit;
      const roi = globalData.summary.roi;
      const updated = globalData.lastUpdated;

      const profitEl = document.getElementById('profit');
      profitEl.textContent = (profit >= 0 ? '+' : '') + profit.toLocaleString() + '円';
      profitEl.classList.remove('negative');
      if (profit < 0) profitEl.classList.add('negative');

      document.getElementById('roi').textContent = 'ROI ' + roi + '%';
      document.getElementById('updated').textContent = '最終更新: ' + updated;
    }

    function renderChart() {
      // Destroy existing chart
      if (chartInstance) {
        chartInstance.destroy();
      }

      const labels = globalData.daily.map(d => d.date.slice(5));
      const values = globalData.daily.map(d => d.cumulative);

      chartInstance = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            data: values,
            borderColor: '#4ade80',
            backgroundColor: 'rgba(74, 222, 128, 0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 4,
            pointBackgroundColor: values.map(v => v < 0 ? '#f87171' : '#4ade80'),
            segment: {
              borderColor: ctx => {
                const prev = ctx.p0.parsed.y;
                const curr = ctx.p1.parsed.y;
                // Only red if both points are below zero
                return (prev < 0 && curr < 0) ? '#f87171' : '#4ade80';
              }
            }
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              ticks: { color: '#64748b' },
              grid: { color: 'rgba(255,255,255,0.05)' }
            },
            y: {
              ticks: {
                color: '#64748b',
                callback: v => v.toLocaleString() + '円'
              },
              grid: { color: 'rgba(255,255,255,0.05)' }
            }
          }
        }
      });
    }

    function renderMonthly() {
      // Use selectedMonth if set, otherwise use latest month
      const targetMonth = selectedMonth ? parseInt(selectedMonth) : null;
      const current = targetMonth
        ? globalData.monthly.find(m => parseInt(m.month.slice(5)) === targetMonth)
        : globalData.monthly[globalData.monthly.length - 1];
      if (!current) return;

      const month = parseInt(current.month.slice(5));
      const monthLabel = month + '月';
      const profit = current.profit;
      const roi = current.roi;

      document.getElementById('monthly').innerHTML = `
        <span class="monthly-label">${monthLabel}</span>
        <div>
          <span class="monthly-profit ${profit < 0 ? 'negative' : ''}">${profit >= 0 ? '+' : ''}${profit.toLocaleString()}円</span>
          <span class="monthly-roi">ROI ${roi}%</span>
        </div>
      `;
    }

    // 2026 Japanese holidays (month-day format)
    const HOLIDAYS_2026 = {
      '01-01': '元日',
      '01-12': '成人の日',
      '02-11': '建国記念の日',
      '02-23': '天皇誕生日',
      '03-20': '春分の日',
      '04-29': '昭和の日',
      '05-03': '憲法記念日',
      '05-04': 'みどりの日',
      '05-05': 'こどもの日',
      '05-06': '振替休日',
      '07-20': '海の日',
      '08-11': '山の日',
      '09-21': '敬老の日',
      '09-22': '秋分の日',
      '10-12': 'スポーツの日',
      '11-03': '文化の日',
      '11-23': '勤労感謝の日'
    };

    function isHoliday(dateStr) {
      const md = dateStr.slice(5); // "MM-DD"
      return HOLIDAYS_2026[md] || null;
    }

    // Global state for month groups and selected month
    let monthGroups = {};
    let selectedMonth = null;

    function renderWeekendSelector() {
      const selectorEl = document.getElementById('weekend-selector');
      const monthSelectorEl = document.getElementById('month-selector');
      const daily = globalData.daily;

      // Build date map
      const dateMap = {};
      daily.forEach(d => { dateMap[d.date] = d; });

      // Find date range
      const dates = daily.map(d => new Date(d.date));
      const minDate = new Date(Math.min(...dates));
      const maxDate = new Date(Math.max(...dates));

      // Find first Saturday on or before maxDate
      let sat = new Date(maxDate);
      while (sat.getDay() !== 6) {
        sat.setDate(sat.getDate() - 1);
      }

      // Collect all weekends from newest to oldest
      const weekends = [];
      while (sat >= minDate || new Date(sat.getTime() + 86400000) >= minDate) {
        const sun = new Date(sat);
        sun.setDate(sun.getDate() + 1);
        const mon = new Date(sun);
        mon.setDate(mon.getDate() + 1);

        const satStr = sat.toISOString().slice(0, 10);
        const sunStr = sun.toISOString().slice(0, 10);
        const monStr = mon.toISOString().slice(0, 10);

        const satData = dateMap[satStr] || null;
        const sunData = dateMap[sunStr] || null;
        const monData = dateMap[monStr] || null;
        const monHoliday = isHoliday(monStr);

        // Only include if at least one day has data
        if (satData || sunData || (monHoliday && monData)) {
          const month = sat.getMonth() + 1;
          const weekNum = Math.ceil(sat.getDate() / 7);
          weekends.push({
            sat: satStr,
            sun: sunStr,
            mon: monHoliday ? monStr : null,
            satData,
            sunData,
            monData: monHoliday ? monData : null,
            monHoliday,
            label: `${month}月 第${weekNum}週`
          });
        }

        sat.setDate(sat.getDate() - 7);
      }

      // Sort by date ascending (oldest first)
      weekends.reverse();

      // Group by month - include weekend in both months if it spans across months
      monthGroups = {};
      weekends.forEach(w => {
        const satMonth = parseInt(w.sat.slice(5, 7));
        const sunMonth = parseInt(w.sun.slice(5, 7));

        if (!monthGroups[satMonth]) monthGroups[satMonth] = [];
        monthGroups[satMonth].push(w);

        // If weekend spans two months, add to both
        if (sunMonth !== satMonth) {
          if (!monthGroups[sunMonth]) monthGroups[sunMonth] = [];
          monthGroups[sunMonth].push(w);
        }
      });

      // Calculate profit for each month
      const monthProfits = {};
      globalData.daily.forEach(d => {
        const m = parseInt(d.date.slice(5, 7));
        if (!monthProfits[m]) monthProfits[m] = 0;
        monthProfits[m] += d.profit;
      });

      // Get all months from daily data (more accurate than monthGroups for button display)
      const months = Object.keys(monthProfits).sort((a, b) => a - b);

      // Default to latest month
      if (!selectedMonth || !monthGroups[selectedMonth]) {
        selectedMonth = months[months.length - 1];
      }

      // Render month selector buttons
      let monthHtml = '';
      months.forEach(m => {
        const active = m == selectedMonth ? 'active' : '';
        const profit = monthProfits[m] || 0;
        const profitClass = profit >= 0 ? 'positive' : 'negative';
        monthHtml += `<button class="month-btn ${active} ${profitClass}" data-month="${m}">${m}月</button>`;
      });
      monthSelectorEl.innerHTML = monthHtml;

      // Month button click handler
      monthSelectorEl.onclick = (e) => {
        const btn = e.target.closest('.month-btn');
        if (btn) {
          selectedMonth = btn.dataset.month;
          document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderWeekends();
          renderMonthly();
          // Hide daily card when switching months
          document.getElementById('daily-card').style.display = 'none';
        }
      };

      renderWeekends();

      // Day button click handler (delegated)
      selectorEl.onclick = (e) => {
        const btn = e.target.closest('.day-btn');
        if (btn && !btn.disabled) {
          document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('daily-card').style.display = 'block';
          renderDaily(btn.dataset.date);
        }
      };
    }

    function renderWeekends() {
      const selectorEl = document.getElementById('weekend-selector');
      let html = '';

      if (monthGroups[selectedMonth]) {
        monthGroups[selectedMonth].forEach(w => {
          const weekNum = Math.ceil(parseInt(w.sat.slice(8, 10)) / 7);
          const satBtn = renderDayButton(w.sat, w.satData, '土');
          const sunBtn = renderDayButton(w.sun, w.sunData, '日');
          const monBtn = w.mon ? renderDayButton(w.mon, w.monData, '祝') : '';

          const gridCols = w.mon ? 'grid-template-columns: 1fr 1fr 1fr;' : '';
          html += `
            <div class="weekend-group">
              <div class="weekend-label">第${weekNum}週</div>
              <div class="weekend-buttons" style="${gridCols}">
                ${satBtn}
                ${sunBtn}
                ${monBtn}
              </div>
            </div>
          `;
        });
      }

      selectorEl.innerHTML = html;
    }

    function renderDayButton(dateStr, data, dow) {
      const day = parseInt(dateStr.slice(8, 10));
      if (!data) {
        return `<button class="day-btn" disabled>
          <div class="day-date">${day}(${dow})</div>
          <div class="day-profit">---</div>
        </button>`;
      }
      const profitClass = data.profit >= 0 ? 'positive' : 'negative';
      const profitText = (data.profit >= 0 ? '+' : '') + data.profit.toLocaleString() + '円';
      return `<button class="day-btn ${profitClass}" data-date="${dateStr}">
        <div class="day-date">${day}(${dow})</div>
        <div class="day-profit ${profitClass}">${profitText}</div>
      </button>`;
    }

    function toggleExpand(el) {
      const content = el.nextElementSibling;
      const icon = el.querySelector('.expand-icon');
      if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.textContent = '▼';
      } else {
        content.style.display = 'none';
        icon.textContent = '▶';
      }
    }

    // Helper: Convert number to circled number ①②③...
    function toCircledNum(n) {
      const num = parseInt(n, 10);
      if (num >= 1 && num <= 20) {
        return String.fromCodePoint(0x2460 + num - 1); // ① is U+2460
      }
      return String(num);
    }

    // Helper: Convert bet type to short form
    function toBetTypeShort(type) {
      const map = {
        '単勝': '単', '複勝': '複', '馬連': '連', '馬単': '馬単',
        'ワイド': 'ワ', '3連複': '3複', '3連単': '3単', '枠連': '枠'
      };
      return map[type] || type;
    }

    // Helper: Get horse display string from selection and horses map
    // 単勝 9 → ⑨タマモプルメリア
    // 馬連 3-15 → ③キープカルム/⑮ブエナオンダ
    // 枠連 5-5 → ⑤-⑤ ⑨タマモプルメリア/⑩オンザライン
    function getHorseDisplay(selection, horses, betType) {
      if (!selection) return '';
      if (!horses || Object.keys(horses).length === 0) return selection;

      const nums = String(selection).split('-');

      // 枠連の場合: 枠番を丸数字で表示 + horses の全馬を表示
      if (betType === '枠連') {
        const circled = nums.map(n => toCircledNum(n)).join('-');
        const horseList = Object.keys(horses)
          .sort((a, b) => parseInt(a) - parseInt(b))
          .map(k => toCircledNum(k) + horses[k])
          .join('/');
        return circled + ' ' + horseList;
      }

      // その他の券種: selection の馬番から馬名を取得
      const parts = nums.map(n => {
        const padded = n.padStart(2, '0');
        const name = horses[padded] || horses[n] || horses[String(parseInt(n, 10))];
        return toCircledNum(n) + (name || '?');
      });
      return parts.join('/');
    }

    // Render daily results
    // No hit: 馬名 / 単-100 複-100 / 武器 / 収-200
    // Has hit: 馬名 券種-投資 当+利益 / 武器 / 他N点▶ / 収±レース全体
    function renderDaily(date) {
      const dayData = globalData.daily.find(d => d.date === date);
      const contentEl = document.getElementById('daily-content');

      const profitClass = dayData.profit >= 0 ? 'positive' : 'negative';
      const profitText = (dayData.profit >= 0 ? '+' : '') + dayData.profit.toLocaleString() + '円';

      let html = `<div class="daily-header"><span class="daily-total ${profitClass}">${profitText}</span></div>`;

      // Check for new format (races object) or fallback to legacy format
      const hasNewFormat = globalData.races && Object.keys(globalData.races).some(k => k.startsWith(date));

      if (hasNewFormat) {
        // New format: use races object
        const raceKeys = Object.keys(globalData.races).filter(k => k.startsWith(date)).sort((a, b) => {
          const numA = parseInt(a.match(/(\d+)R$/)[1]);
          const numB = parseInt(b.match(/(\d+)R$/)[1]);
          return numA - numB;
        });

        raceKeys.forEach(raceKey => {
          const raceData = globalData.races[raceKey];
          const raceName = raceKey.slice(11); // Remove "YYYY-MM-DD_" prefix
          const horses = raceData.horses || {};
          const raceBets = raceData.bets || [];
          const raceTitle = raceData.title || '';

          // 中止レースの特別処理
          if (raceTitle.includes('中止')) {
            html += `<div class="race-block"><div class="race-name">${raceName} <span class="cancelled">${raceTitle}</span></div>`;
            // 馬番でグループ化して重複表示を防ぐ
            const seen = {};
            raceBets.forEach(b => {
              if (seen[b.selection]) return;
              seen[b.selection] = true;
              const display = getHorseDisplay(b.selection, horses, b.type);
              html += `<div class="row"><span class="left">${display}</span><span class="right"><span class="refund">返金</span></span></div>`;
              if (b.weapon && b.weapon !== '-') {
                html += `<div class="row"><span class="left sub">${b.weapon}</span><span class="right"></span></div>`;
              }
            });
            html += `<div class="row"><span class="left"></span><span class="right">収<span class="neutral">±0</span></span></div></div>`;
            return;
          }

          html += `<div class="race-block"><div class="race-name">${raceName}</div>`;

          const hasHit = raceBets.some(b => b.payout > 0);
          const raceProfit = raceBets.reduce((sum, b) => sum + (b.payout - b.amount), 0);
          const raceProfitCls = raceProfit >= 0 ? 'win' : 'loss';
          const raceProfitSign = raceProfit >= 0 ? '+' : '';

          if (hasHit) {
            // Group ALL bets by selection (horse)
            const bySelection = {};
            raceBets.forEach(b => {
              const key = b.selection;
              if (!bySelection[key]) bySelection[key] = [];
              bySelection[key].push(b);
            });

            // Separate into hit groups, refund groups, and pure miss bets
            const hitGroups = [];
            const refundGroups = [];
            const pureMissBets = [];
            Object.entries(bySelection).forEach(([sel, bets]) => {
              if (bets.some(b => b.payout > b.amount)) {
                hitGroups.push({ selection: sel, bets });
              } else if (bets.some(b => b.payout > 0)) {
                refundGroups.push({ selection: sel, bets });
              } else {
                pureMissBets.push(...bets);
              }
            });

            // Render hit groups (horse-level: all bets + total payout)
            let hitNetTotal = 0;
            hitGroups.forEach(group => {
              const display = getHorseDisplay(group.selection, horses, group.bets[0].type);
              let rightParts = '';
              let groupPayout = 0;
              group.bets.forEach(b => {
                const type = toBetTypeShort(b.type);
                rightParts += `${type}<span class="loss">-${b.amount}</span> `;
                groupPayout += b.payout;
              });
              const groupInvest = group.bets.reduce((sum, b) => sum + b.amount, 0);
              hitNetTotal += groupPayout - groupInvest;
              rightParts += `🎯<span class="win">+${groupPayout.toLocaleString()}</span>`;
              html += `<div class="row"><span class="left">${display}</span><span class="right">${rightParts}</span></div>`;
              const weapon = group.bets.find(b => b.weapon && b.weapon !== '-');
              if (weapon) {
                html += `<div class="row"><span class="left sub">${weapon.weapon}</span><span class="right"></span></div>`;
              }
            });

            // Render refund groups
            refundGroups.forEach(group => {
              const display = getHorseDisplay(group.selection, horses, group.bets[0].type);
              html += `<div class="row"><span class="left">${display}</span><span class="right"><span class="refund">返金</span></span></div>`;
              const weapon = group.bets.find(b => b.weapon && b.weapon !== '-');
              if (weapon) {
                html += `<div class="row"><span class="left sub">${weapon.weapon}</span><span class="right"></span></div>`;
              }
            });

            // Show pure miss bets collapsed
            if (pureMissBets.length > 0) {
              if (hitGroups.length > 0) {
                const hitNetCls = hitNetTotal >= 0 ? 'win' : 'loss';
                const hitNetSign = hitNetTotal >= 0 ? '+' : '';
                html += `<div class="row"><span class="left"></span><span class="right">収<span class="${hitNetCls}">${hitNetSign}${hitNetTotal.toLocaleString()}</span></span></div>`;
              }

              const missTotal = pureMissBets.reduce((sum, b) => sum - b.amount, 0);
              html += `<div class="row expand-trigger" onclick="toggleExpand(this)"><span class="left">他${pureMissBets.length}点</span><span class="right"><span class="expand-icon">▼</span>収<span class="loss">${missTotal.toLocaleString()}</span></span></div>`;
              html += `<div class="expand-content">`;
              pureMissBets.forEach(b => {
                const type = toBetTypeShort(b.type);
                const display = getHorseDisplay(b.selection, horses, b.type);
                html += `<div class="row"><span class="left">${display}</span><span class="right">${type}<span class="loss">-${b.amount}</span></span></div>`;
              });
              html += `</div>`;
            }

            html += `<div class="row"><span class="left"></span><span class="right">収<span class="${raceProfitCls}">${raceProfitSign}${raceProfit.toLocaleString()}</span></span></div>`;

          } else {
            // NO HIT
            const tanpuku = raceBets.filter(b => b.type === '単勝' || b.type === '複勝');
            const others = raceBets.filter(b => b.type !== '単勝' && b.type !== '複勝');

            // Group tanpuku by selection
            const grouped = {};
            tanpuku.forEach(b => {
              const key = b.selection;
              if (!grouped[key]) grouped[key] = { selection: key, weapon: b.weapon, win: null, place: null };
              if (b.type === '単勝') grouped[key].win = b;
              else if (b.type === '複勝') grouped[key].place = b;
            });

            let tanpukuTotal = 0;
            Object.values(grouped).forEach(g => {
              let line1Right = '';
              if (g.win) {
                tanpukuTotal -= g.win.amount;
                line1Right += `単<span class="loss">-${g.win.amount}</span>`;
              }
              if (g.place) {
                tanpukuTotal -= g.place.amount;
                if (line1Right) line1Right += ' ';
                line1Right += `複<span class="loss">-${g.place.amount}</span>`;
              }
              const display = getHorseDisplay(g.selection, horses, g.win ? g.win.type : g.place.type);
              html += `<div class="row"><span class="left">${display}</span><span class="right">${line1Right}</span></div>`;
              if (g.weapon && g.weapon !== '-') {
                html += `<div class="row"><span class="left sub">${g.weapon}</span><span class="right"></span></div>`;
              }
            });

            // Render other bets collapsed
            if (others.length > 0) {
              if (Object.keys(grouped).length > 0) {
                html += `<div class="row"><span class="left"></span><span class="right">収<span class="loss">${tanpukuTotal.toLocaleString()}</span></span></div>`;
              }

              const othersTotal = others.reduce((sum, b) => sum - b.amount, 0);
              html += `<div class="row expand-trigger" onclick="toggleExpand(this)"><span class="left">他${others.length}点</span><span class="right"><span class="expand-icon">▼</span>収<span class="loss">${othersTotal.toLocaleString()}</span></span></div>`;
              html += `<div class="expand-content">`;
              others.forEach(b => {
                const type = toBetTypeShort(b.type);
                const display = getHorseDisplay(b.selection, horses, b.type);
                html += `<div class="row"><span class="left">${display}</span><span class="right">${type}<span class="loss">-${b.amount}</span></span></div>`;
              });
              html += `</div>`;
            }

            html += `<div class="row"><span class="left"></span><span class="right">収<span class="${raceProfitCls}">${raceProfitSign}${raceProfit.toLocaleString()}</span></span></div>`;
          }

          html += `</div>`;
        });

      } else {
        // Legacy format: use bets array
        const bets = globalData.bets.filter(b => b.date === date);

        // Group bets by race
        const races = {};
        bets.forEach(b => {
          if (!races[b.race]) races[b.race] = [];
          races[b.race].push(b);
        });

        Object.entries(races).forEach(([race, raceBets]) => {
          html += `<div class="race-block"><div class="race-name">${race}</div>`;

          const hasHit = raceBets.some(b => b.payout > 0);
          const raceProfit = raceBets.reduce((sum, b) => sum + (b.payout - b.amount), 0);
          const raceProfitCls = raceProfit >= 0 ? 'win' : 'loss';
          const raceProfitSign = raceProfit >= 0 ? '+' : '';

          if (hasHit) {
            // Group ALL bets by horse
            const byHorse = {};
            raceBets.forEach(b => {
              const key = b.horse || b.selection;
              const num = b.number || ((b.betType === '単勝' || b.betType === '複勝') ? b.selection : null);
              if (!byHorse[key]) byHorse[key] = { horse: key, number: num, bets: [] };
              byHorse[key].bets.push(b);
            });

            // Separate into hit groups, refund groups, and pure miss bets
            const hitGroups = [];
            const refundGroups = [];
            const pureMissBets = [];
            Object.entries(byHorse).forEach(([key, group]) => {
              if (group.bets.some(b => b.payout > b.amount)) {
                hitGroups.push(group);
              } else if (group.bets.some(b => b.payout > 0)) {
                refundGroups.push(group);
              } else {
                pureMissBets.push(...group.bets);
              }
            });

            // Render hit groups (horse-level: all bets + total payout)
            let hitNetTotal = 0;
            hitGroups.forEach(h => {
              let line1Right = '';
              let groupPayout = 0;
              h.bets.forEach(b => {
                const type = toBetTypeShort(b.betType);
                if (line1Right) line1Right += ' ';
                line1Right += `${type}<span class="loss">-${b.amount}</span>`;
                groupPayout += b.payout;
              });
              const groupInvest = h.bets.reduce((sum, b) => sum + b.amount, 0);
              hitNetTotal += groupPayout - groupInvest;
              line1Right += ` 🎯<span class="win">+${groupPayout.toLocaleString()}</span>`;
              const numStr = h.number ? h.number + ' ' : '';
              html += `<div class="row"><span class="left">${numStr}${h.horse}</span><span class="right">${line1Right}</span></div>`;
              const weapon = h.bets.find(b => b.weapon && b.weapon !== '-');
              if (weapon) {
                html += `<div class="row"><span class="left sub">${weapon.weapon}</span><span class="right"></span></div>`;
              }
            });

            // Render refund groups
            refundGroups.forEach(h => {
              const numStr = h.number ? h.number + ' ' : '';
              html += `<div class="row"><span class="left">${numStr}${h.horse}</span><span class="right"><span class="refund">返金</span></span></div>`;
              const weapon = h.bets.find(b => b.weapon && b.weapon !== '-');
              if (weapon) {
                html += `<div class="row"><span class="left sub">${weapon.weapon}</span><span class="right"></span></div>`;
              }
            });

            if (pureMissBets.length > 0) {
              if (hitGroups.length > 0) {
                const hitNetCls = hitNetTotal >= 0 ? 'win' : 'loss';
                const hitNetSign = hitNetTotal >= 0 ? '+' : '';
                html += `<div class="row"><span class="left"></span><span class="right">収<span class="${hitNetCls}">${hitNetSign}${hitNetTotal.toLocaleString()}</span></span></div>`;
              }

              const missTotal = pureMissBets.reduce((sum, b) => sum - b.amount, 0);
              html += `<div class="row expand-trigger" onclick="toggleExpand(this)"><span class="left">他${pureMissBets.length}点</span><span class="right"><span class="expand-icon">▼</span>収<span class="loss">${missTotal.toLocaleString()}</span></span></div>`;
              html += `<div class="expand-content">`;
              pureMissBets.forEach(b => {
                const type = toBetTypeShort(b.betType);
                const name = b.horse || b.selection;
                const num = b.number || ((b.betType === '単勝' || b.betType === '複勝') ? b.selection : null);
                const numStr = num ? num + ' ' : '';
                html += `<div class="row"><span class="left">${numStr}${name}</span><span class="right">${type}<span class="loss">-${b.amount}</span></span></div>`;
              });
              html += `</div>`;
            }

            html += `<div class="row"><span class="left"></span><span class="right">収<span class="${raceProfitCls}">${raceProfitSign}${raceProfit.toLocaleString()}</span></span></div>`;

          } else {
            const tanpuku = raceBets.filter(b => b.betType === '単勝' || b.betType === '複勝');
            const others = raceBets.filter(b => b.betType !== '単勝' && b.betType !== '複勝');

            const horses = {};
            tanpuku.forEach(b => {
              const key = b.horse || b.selection;
              const num = b.number || b.selection;
              if (!horses[key]) horses[key] = { horse: key, number: num, weapon: b.weapon, win: null, place: null };
              if (b.betType === '単勝') horses[key].win = b;
              else if (b.betType === '複勝') horses[key].place = b;
            });

            let tanpukuTotal = 0;
            Object.values(horses).forEach(h => {
              let line1Right = '';
              if (h.win) {
                tanpukuTotal -= h.win.amount;
                line1Right += `単<span class="loss">-${h.win.amount}</span>`;
              }
              if (h.place) {
                tanpukuTotal -= h.place.amount;
                if (line1Right) line1Right += ' ';
                line1Right += `複<span class="loss">-${h.place.amount}</span>`;
              }
              const numStr = h.number ? h.number + ' ' : '';
              html += `<div class="row"><span class="left">${numStr}${h.horse}</span><span class="right">${line1Right}</span></div>`;
              if (h.weapon && h.weapon !== '-') {
                html += `<div class="row"><span class="left sub">${h.weapon}</span><span class="right"></span></div>`;
              }
            });

            if (others.length > 0) {
              if (Object.keys(horses).length > 0) {
                html += `<div class="row"><span class="left"></span><span class="right">収<span class="loss">${tanpukuTotal.toLocaleString()}</span></span></div>`;
              }

              const othersTotal = others.reduce((sum, b) => sum - b.amount, 0);
              html += `<div class="row expand-trigger" onclick="toggleExpand(this)"><span class="left">他${others.length}点</span><span class="right"><span class="expand-icon">▼</span>収<span class="loss">${othersTotal.toLocaleString()}</span></span></div>`;
              html += `<div class="expand-content">`;
              others.forEach(b => {
                const type = toBetTypeShort(b.betType);
                const name = b.horse || b.selection;
                const numStr = b.number ? b.number + ' ' : '';
                html += `<div class="row"><span class="left">${numStr}${name}</span><span class="right">${type}<span class="loss">-${b.amount}</span></span></div>`;
              });
              html += `</div>`;
            }

            html += `<div class="row"><span class="left"></span><span class="right">収<span class="${raceProfitCls}">${raceProfitSign}${raceProfit.toLocaleString()}</span></span></div>`;
          }

          html += `</div>`;
        });
      }

      contentEl.innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
